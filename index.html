<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>utils</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      background: #0f0f0f;
      color: #eee;
      margin: 40px;
      max-width: 1000px;
    }
    h1 { font-size: 2.6rem; }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 20px;
    }
    .card {
      background: #1f1f1f;
      padding: 25px;
      border-radius: 10px;
      text-decoration: none;
      color: inherit;
    }
    .card:hover {
      background: #2a2a2a;
    }
  </style>
</head>
<body>
  <h1>🛠️ utils</h1>
  <p style="opacity:0.7">Web utilities</p>

  <div class="grid">
    <a href="base64/" class="card">
      <h2>🔐 Base64</h2>
      <p>Encode / Decode with preview</p>
    </a>

    <a href="ldr2xml/" class="card">
      <h2>📦 ldr2xml</h2>
      <p>SQL*Loader to XML</p>
    </a>

    <a href="sqldoc/" class="card">
      <h2>📖 sqldoc</h2>
      <p>SQL Query Documentation</p>
    </a>
  </div>
</body>
</html>
